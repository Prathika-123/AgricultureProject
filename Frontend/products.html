<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Products</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #4fa65b;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            color: white;
            margin: 30px 0 10px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 28px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 18px;
            padding: 14px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 14px;
        }

        .card h3 {
            margin: 10px 0 4px;
            color: #2e7d32;
            font-size: 18px;
        }

        .desc {
            font-size: 14px;
            color: #444;
            margin-bottom: 6px;
        }

        .price {
            font-weight: bold;
            color: #1b5e20;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .add-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-btn:hover {
            background: #1b5e20;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .grid {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

<h1>My Uploaded Products</h1>

<div class="grid" id="productGrid"></div>

<script>
    async function loadAllProducts() {
        const res = await fetch("http://localhost:8083/get/all/products");
        const products = await res.json();

        const grid = document.getElementById("productGrid");
        grid.innerHTML = "";

        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.imageUrl}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="desc">${p.description}</div>
                    <div class="price">₹ ${p.cost}</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">
                        Add to Cart
                    </button>
                </div>
            `;
        });
    }

    async function addToCart(productId) {
        const userId = localStorage.getItem("userId");

        if (!userId) {
            alert("Please login to add products to cart");
            return;
        }

        const quantity = prompt("Enter quantity:");

        if (!quantity || quantity <= 0) {
            alert("Invalid quantity");
            return;
        }

        try {
            const res = await fetch(
                `http://localhost:8083/cart/add?userId=${userId}&productId=${productId}&quantity=${quantity}`,
                { method: "POST" }
            );

            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }

            alert("Product added to cart successfully");
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    loadAllProducts();
</script>

</body>
</html>
